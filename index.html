<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SURGE — Premium Home Fitness</title>
<meta name="description" content="SURGE — Premium Fitnessprodukte für dein Home-Gym. Feste Preise, schneller Versand, 30 Tage Rückgabe.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0b14; --bg-2:#161220; --bg-3:#1d1830;
  --ink:#f5f3ff; --ink-dim:#a89fc4;
  --violet:#6d5ef5; --coral:#ff5470; --green:#3fbf72;
  --line:rgba(245,243,255,0.1); --chrome:#c9ccd1;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased; overflow-x:hidden;}
.mono{font-family:'JetBrains Mono',monospace;}
img,canvas{display:block; max-width:100%;}
a{color:inherit;}

/* ---------- NAV ---------- */
nav{position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:18px 5vw; background:rgba(14,11,20,0.78); backdrop-filter:blur(14px); border-bottom:1px solid var(--line);}
.logo{display:flex; align-items:center; gap:9px; font-family:'Space Grotesk'; font-weight:700; font-size:21px;}
.logo svg{width:22px; height:22px;}
nav .links{display:flex; gap:26px; font-size:13.5px;}
nav .links a{color:var(--ink-dim); text-decoration:none; transition:color .2s;}
nav .links a:hover{color:var(--ink);}
.nav-right{display:flex; align-items:center; gap:16px;}
.icon-btn{position:relative; background:none; border:1px solid var(--line); color:var(--ink); width:38px; height:38px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:border-color .2s;}
.icon-btn:hover{border-color:var(--violet);}
.badge-dot{position:absolute; top:-5px; right:-5px; background:var(--coral); color:#fff; font-size:10px; font-weight:700; width:17px; height:17px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono';}
@media(max-width:900px){ nav .links{display:none;} }

/* ---------- HERO ---------- */
.hero{position:relative; min-height:90vh; display:flex; align-items:center; border-bottom:1px solid var(--line); overflow:hidden;
  background:radial-gradient(ellipse 55% 60% at 78% 30%, rgba(109,94,245,0.28), transparent 60%), radial-gradient(ellipse 45% 45% at 90% 80%, rgba(255,84,112,0.16), transparent 60%);}
#hero-canvas{position:absolute; inset:0; width:100%; height:100%; z-index:1;}
.hero-visual{position:absolute; right:2vw; top:50%; transform:translateY(-50%); width:min(52vw,640px); height:min(52vw,640px); z-index:1; perspective:1200px;}
.hero-glow{position:absolute; inset:8%; border-radius:50%; background:radial-gradient(circle, rgba(109,94,245,0.45) 0%, rgba(255,84,112,0.22) 45%, transparent 72%); filter:blur(30px); animation:pulseGlow 5s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{opacity:0.75; transform:scale(1);} 50%{opacity:1; transform:scale(1.06);}}
#hero-dumbbell{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 30px 40px rgba(0,0,0,0.55)); will-change:transform; transform-style:preserve-3d;}
@media(max-width:900px){ .hero-visual{position:relative; right:auto; top:auto; transform:none; width:80vw; height:80vw; margin:0 auto; order:-1;} }
.hero-content{position:relative; z-index:2; padding:0 5vw; width:100%; display:grid; grid-template-columns:1.1fr 0.9fr; gap:40px; align-items:center;}
.eyebrow{font-family:'JetBrains Mono'; color:var(--coral); font-size:12px; letter-spacing:3px; display:flex; align-items:center; gap:10px; margin-bottom:18px;}
.eyebrow::before{content:''; width:24px; height:1px; background:var(--coral);}
.hero h1{font-family:'Space Grotesk'; font-weight:700; font-size:clamp(36px,5.2vw,60px); line-height:1.03; max-width:12ch;}
.hero h1 .grad{background:linear-gradient(90deg,var(--violet),var(--coral)); -webkit-background-clip:text; background-clip:text; color:transparent;}
.hero p.lede{margin-top:20px; max-width:44ch; color:var(--ink-dim); font-size:16px; line-height:1.65;}
.hero-cta{display:flex; gap:14px; margin-top:30px; flex-wrap:wrap;}
.btn{padding:14px 26px; border-radius:999px; font-size:14px; font-weight:600; text-decoration:none; cursor:pointer; border:none; transition:transform .15s, opacity .2s; display:inline-flex; align-items:center; gap:8px;}
.btn:hover{transform:translateY(-2px);}
.btn.primary{background:linear-gradient(90deg,var(--violet),var(--coral)); color:#fff;}
.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--ink);}
.product-panel{background:rgba(22,18,32,0.55); border:1px solid var(--line); border-radius:14px; padding:24px; backdrop-filter:blur(16px);}
.product-panel .pk{font-family:'JetBrains Mono'; font-size:11px; color:var(--violet); letter-spacing:2px; margin-bottom:10px;}
.product-panel h3{font-family:'Space Grotesk'; font-size:21px; font-weight:600; margin-bottom:10px;}
.product-panel .price{font-family:'JetBrains Mono'; font-size:25px; color:var(--coral); margin-bottom:14px;}
.spec-list{list-style:none; display:flex; flex-direction:column; gap:8px;}
.spec-list li{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-dim); border-top:1px dashed var(--line); padding-top:8px; font-family:'JetBrains Mono';}
.spec-list li b{color:var(--ink); font-weight:500;}
@media(max-width:900px){ .hero-content{grid-template-columns:1fr; padding-top:12vh; padding-bottom:8vh;} }

/* ---------- TRUST BAR ---------- */
.trust{display:grid; grid-template-columns:repeat(5,1fr); border-bottom:1px solid var(--line);}
.trust div{padding:26px 1.5vw 22px; border-right:1px solid var(--line); text-align:center; display:flex; flex-direction:column; align-items:center;}
.trust div:last-child{border-right:none;}
.trust .ic{width:34px; height:34px; margin:0 auto 10px; display:flex; align-items:center; justify-content:center;}
.trust .ic svg{width:100%; height:100%;}
.trust p{font-size:12px; color:var(--ink-dim); letter-spacing:0.1px;}
.trust-extra{margin-top:10px; display:flex; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap;}
.pay-mini{font-family:'JetBrains Mono'; font-size:8.5px; letter-spacing:0.3px; border:1px solid var(--line); padding:3px 6px; border-radius:4px; color:var(--chrome); background:rgba(255,255,255,0.03);}
.avatar-stack{display:flex; align-items:center; justify-content:center; margin-top:10px;}
.avatar-stack .av{width:22px; height:22px; border-radius:50%; border:2px solid var(--bg); margin-left:-7px; background:linear-gradient(135deg,var(--violet),var(--coral)); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#fff; font-family:'Space Grotesk';}
.avatar-stack .av:first-child{margin-left:0;}
.trust-stars{margin-top:6px; font-size:11px; color:#f5c945; letter-spacing:1px;}
.trust-stars span{color:var(--ink-dim); font-family:'JetBrains Mono'; margin-left:4px; letter-spacing:0;}
@media(max-width:820px){ .trust{grid-template-columns:repeat(2,1fr);} .trust div{border-right:none; border-bottom:1px solid var(--line);} }

/* ---------- SECTION HEAD ---------- */
.section-head{padding:9vh 5vw 4vh;}
.section-head h2{font-family:'Space Grotesk'; font-size:clamp(26px,3.2vw,40px); font-weight:600;}
.section-head p{color:var(--ink-dim); font-size:14px; max-width:48ch; margin-top:8px;}

/* ---------- FLASH SALE ---------- */
.flash{margin:0 5vw 8vh; padding:26px 30px; border-radius:18px; background:linear-gradient(120deg, rgba(109,94,245,0.18), rgba(255,84,112,0.14)); border:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px;}
.flash-left h3{font-family:'Space Grotesk'; font-size:20px; margin-bottom:4px;}
.flash-left p{font-size:13px; color:var(--ink-dim);}
.countdown{display:flex; gap:10px;}
.countdown div{background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:10px 14px; text-align:center; min-width:56px;}
.countdown .num{font-family:'JetBrains Mono'; font-size:20px; font-weight:600;}
.countdown .lbl{font-size:10px; color:var(--ink-dim); letter-spacing:1px;}

/* ---------- PRODUCTS ---------- */
.products{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:22px; padding:0 5vw 4vh;}
.pcard{background:var(--bg-2); border:1px solid var(--line); border-radius:16px; padding:20px; display:flex; flex-direction:column; gap:12px; transition:border-color .25s, transform .25s; position:relative;}
.pcard:hover{border-color:var(--violet); transform:translateY(-4px);}
.pcard .thumb{height:172px; border-radius:12px; position:relative; overflow:hidden;
  background:
    radial-gradient(ellipse 70% 55% at 50% 38%, rgba(109,94,245,0.22), transparent 70%),
    linear-gradient(180deg, #211c33 0%, #15111f 78%, #0e0b14 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
}
.pcard .thumb::after{content:''; position:absolute; inset:0; background:radial-gradient(ellipse 90% 60% at 50% 100%, rgba(0,0,0,0.5), transparent 65%); pointer-events:none;}
.pcard .thumb canvas{width:100% !important; height:100% !important; position:relative; z-index:1;}
.pcard .thumb img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease; position:relative;}
.pcard:hover .thumb img{transform:scale(1.06);}
.pcard:hover .thumb{box-shadow:inset 0 0 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06), 0 0 0 1px rgba(109,94,245,0.25);}
.badges{position:absolute; top:10px; left:10px; display:flex; gap:6px; z-index:2;}
.badge{font-family:'JetBrains Mono'; font-size:9.5px; letter-spacing:0.5px; text-transform:uppercase; padding:4px 8px; border-radius:99px; font-weight:600;}
.badge.best{background:var(--violet); color:#fff;}
.badge.new{background:var(--green); color:#08331b;}
.badge.limited{background:#f5c945; color:#3a2c00;}
.badge.sale{background:var(--coral); color:#fff;}
.pcard h3{font-family:'Space Grotesk'; font-size:16.5px; font-weight:600;}
.rating{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-dim);}
.stars{color:#f5c945; letter-spacing:1px; font-size:12px;}
.pcard .desc{font-size:12px; color:var(--ink-dim); line-height:1.5; min-height:32px;}
.price-row{display:flex; align-items:baseline; gap:8px;}
.price-now{font-family:'JetBrains Mono'; font-size:18px; font-weight:600;}
.price-old{font-family:'JetBrains Mono'; font-size:13px; color:var(--ink-dim); text-decoration:line-through;}
.stock{font-size:11px; color:var(--coral); font-family:'JetBrains Mono';}
.bottom{display:flex; align-items:center; justify-content:space-between; margin-top:2px; gap:8px;}
.add-btn{background:var(--violet); color:#fff; border:none; padding:10px 14px; border-radius:99px; font-size:12px; font-weight:600; cursor:pointer; transition:background .2s; white-space:nowrap;}
.add-btn:hover{background:var(--coral);}
.add-btn.added{background:var(--green);}

/* bundle strip */
.bundles{display:flex; gap:16px; padding:0 5vw 10vh; flex-wrap:wrap;}
.bundle{flex:1; min-width:220px; background:var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:20px; text-align:center;}
.bundle .pct{font-family:'Space Grotesk'; font-size:26px; color:var(--coral); font-weight:700;}
.bundle p{font-size:13px; color:var(--ink-dim); margin-top:4px;}

/* ---------- SOCIAL PROOF ---------- */
.reviews{padding:0 5vw 10vh;}
.review-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; margin-top:2vh;}
.review-card{background:var(--bg-2); border:1px solid var(--line); border-radius:14px; padding:20px;}
.review-card .stars{margin-bottom:10px; display:block;}
.review-card p{font-size:13px; color:var(--ink-dim); line-height:1.6; margin-bottom:12px;}
.review-name{font-size:12.5px; font-weight:600; font-family:'Space Grotesk';}

/* ---------- NEWSLETTER ---------- */
.newsletter{margin:0 5vw 10vh; padding:50px 6vw; border-radius:20px; text-align:center; background:linear-gradient(120deg, rgba(109,94,245,0.22), rgba(255,84,112,0.16)); border:1px solid var(--line);}
.newsletter h2{font-family:'Space Grotesk'; font-size:clamp(24px,3vw,32px); margin-bottom:10px;}
.newsletter p{color:var(--ink-dim); font-size:14px; margin-bottom:24px;}
.nl-form{display:flex; gap:10px; max-width:420px; margin:0 auto; flex-wrap:wrap; justify-content:center;}
.nl-form input{flex:1; min-width:200px; padding:13px 18px; border-radius:99px; border:1px solid var(--line); background:var(--bg-2); color:var(--ink); font-size:14px;}
.nl-form input:focus{outline:none; border-color:var(--violet);}

/* ---------- FAQ ---------- */
.faq{padding:0 5vw 10vh; max-width:820px;}
.faq-item{border-bottom:1px solid var(--line);}
.faq-q{width:100%; text-align:left; background:none; border:none; color:var(--ink); font-family:'Space Grotesk'; font-size:15.5px; padding:18px 4px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.faq-a{max-height:0; overflow:hidden; transition:max-height .3s ease;}
.faq-a p{font-size:13.5px; color:var(--ink-dim); padding:0 4px 18px; line-height:1.6;}
.faq-item.open .faq-a{max-height:200px;}
.faq-item.open .chev{transform:rotate(45deg);}
.chev{transition:transform .2s; font-size:18px; color:var(--violet);}

/* ---------- CART DRAWER ---------- */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; opacity:0; pointer-events:none; transition:opacity .3s;}
.overlay.open{opacity:1; pointer-events:auto;}
.cart-drawer{position:fixed; top:0; right:0; height:100%; width:min(400px,92vw); background:var(--bg-2); border-left:1px solid var(--line); z-index:201; transform:translateX(100%); transition:transform .3s ease; display:flex; flex-direction:column;}
.cart-drawer.open{transform:translateX(0);}
.cart-head{display:flex; justify-content:space-between; align-items:center; padding:22px 24px; border-bottom:1px solid var(--line);}
.cart-head h3{font-family:'Space Grotesk'; font-size:19px;}
.cart-close{background:none; border:none; color:var(--ink-dim); font-size:22px; cursor:pointer;}
.cart-items{flex:1; overflow-y:auto; padding:16px 24px; display:flex; flex-direction:column; gap:16px;}
.cart-empty{color:var(--ink-dim); font-size:14px; text-align:center; margin-top:40px;}
.cart-item{display:flex; justify-content:space-between; align-items:center; gap:10px; border-bottom:1px solid var(--line); padding-bottom:14px;}
.cart-item .ci-name{font-size:13.5px; font-weight:500;}
.cart-item .ci-price{font-family:'JetBrains Mono'; font-size:12px; color:var(--ink-dim);}
.qty-ctrl{display:flex; align-items:center; gap:8px;}
.qty-ctrl button{width:24px; height:24px; border-radius:50%; border:1px solid var(--line); background:none; color:var(--ink); cursor:pointer;}
.cart-foot{padding:22px 24px; border-top:1px solid var(--line);}
.free-ship-note{font-size:11.5px; color:var(--ink-dim); margin-bottom:12px;}
.cart-total{display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:16px; margin-bottom:14px;}
.checkout-btn{width:100%; padding:14px; border:none; border-radius:99px; background:linear-gradient(90deg,var(--violet),var(--coral)); color:#fff; font-weight:600; font-size:14px; cursor:pointer;}
.checkout-note{font-size:11px; color:var(--ink-dim); margin-top:10px; line-height:1.5;}

/* ---------- STICKY MOBILE BAR ---------- */
.sticky-bar{position:fixed; bottom:0; left:0; right:0; z-index:150; background:rgba(14,11,20,0.92); backdrop-filter:blur(12px); border-top:1px solid var(--line); padding:12px 5vw; display:none; align-items:center; justify-content:space-between; gap:14px;}
.sticky-bar.show{display:flex;}
.sticky-bar .info{font-size:13px;}
.sticky-bar .info b{display:block; font-family:'JetBrains Mono'; color:var(--coral);}

/* ---------- EXIT POPUP ---------- */
.exit-overlay{position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:300; opacity:0; pointer-events:none; transition:opacity .3s; display:flex; align-items:center; justify-content:center;}
.exit-overlay.open{opacity:1; pointer-events:auto;}
.exit-modal{background:var(--bg-2); border:1px solid var(--line); border-radius:18px; padding:40px; max-width:420px; text-align:center; position:relative;}
.exit-modal h3{font-family:'Space Grotesk'; font-size:24px; margin-bottom:10px;}
.exit-modal p{color:var(--ink-dim); font-size:13.5px; margin-bottom:20px;}
.exit-close{position:absolute; top:14px; right:18px; background:none; border:none; color:var(--ink-dim); font-size:20px; cursor:pointer;}

/* ---------- IMPRESSUM ---------- */
.impressum{padding:10vh 5vw 10vh; border-top:1px solid var(--line); background:var(--bg-2);}
.impressum h2{font-family:'Space Grotesk'; font-size:clamp(24px,3vw,32px); margin-bottom:26px;}
.imp-grid{display:grid; grid-template-columns:1fr 1fr; gap:36px; max-width:900px;}
.imp-block h4{font-family:'Space Grotesk'; font-size:14.5px; margin-bottom:10px; color:var(--violet);}
.imp-block p{font-size:13.5px; color:var(--ink-dim); line-height:1.8;}
.imp-note{margin-top:30px; max-width:760px; padding:16px 20px; border-left:3px solid var(--coral); background:rgba(255,84,112,0.06); font-size:12.5px; color:var(--ink-dim); line-height:1.7; border-radius:3px;}
.imp-note b{color:var(--ink);}
@media(max-width:700px){ .imp-grid{grid-template-columns:1fr;} }

/* ---------- FOOTER ---------- */
footer{padding:6vh 5vw 12vh; border-top:1px solid var(--line);}
.footer-grid{display:grid; grid-template-columns:2fr repeat(4,1fr); gap:30px; margin-bottom:40px;}
.footer-brand{font-family:'Space Grotesk'; font-weight:700; font-size:19px; margin-bottom:10px;}
.footer-grid p{font-size:12.5px; color:var(--ink-dim); line-height:1.6; max-width:26ch;}
.footer-col h5{font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:14px; font-family:'JetBrains Mono';}
.footer-col ul{list-style:none; display:flex; flex-direction:column; gap:9px;}
.footer-col a{font-size:13px; color:var(--ink-dim); text-decoration:none;}
.footer-col a:hover{color:var(--ink);}
.pay-row{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
.pay-chip{font-family:'JetBrains Mono'; font-size:10px; border:1px solid var(--line); padding:5px 9px; border-radius:5px; color:var(--ink-dim);}
.footer-bottom{display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:12px; color:var(--ink-dim); font-family:'JetBrains Mono'; border-top:1px solid var(--line); padding-top:24px;}
@media(max-width:900px){ .footer-grid{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M13 2 L4 14H11L10 22L20 9H13L13 2Z" fill="url(#bolt)"/><defs><linearGradient id="bolt" x1="4" y1="2" x2="20" y2="22"><stop offset="0" stop-color="#6d5ef5"/><stop offset="1" stop-color="#ff5470"/></linearGradient></defs></svg>
    SURGE
  </div>
  <div class="links">
    <a href="#produkte">Shop</a>
    <a href="#kategorien">Kategorien</a>
    <a href="#bestseller">Bestseller</a>
    <a href="#reviews">Bewertungen</a>
    <a href="#faq">FAQ</a>
    <a href="#impressum">Impressum</a>
  </div>
  <div class="nav-right">
    <button class="icon-btn" title="Suche">🔍</button>
    <button class="icon-btn" title="Konto">👤</button>
    <button class="icon-btn" onclick="toggleCart(true)" title="Warenkorb">🛒<span class="badge-dot" id="cartCount">0</span></button>
  </div>
</nav>

<section class="hero">
